<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Códigos — Guía GLP-1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0A2A18, #17452A);
    min-height: 100vh; color: #fff; padding: 32px 16px;
  }
  .card {
    max-width: 560px; margin: 0 auto; background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15); border-radius: 16px; padding: 28px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: rgba(255,255,255,.6); font-size: 13px; margin-bottom: 20px; }
  .aviso {
    background: rgba(212,175,55,.12); border: 1px solid rgba(212,175,55,.4);
    border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #E8D48B; margin-bottom: 20px;
  }
  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; color: #A7E3B8; margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.1); color: #fff; font-size: 16px; font-weight: 600;
  }
  input:focus { outline: 2px solid #D4AF37; }
  .row { display: flex; gap: 10px; margin-bottom: 20px; }
  .row input { flex: 1; }
  button {
    padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer;
    font-size: 15px; font-weight: 700; background: #16A34A; color: #fff;
  }
  button:hover { background: #15803D; }
  button.sec { background: rgba(255,255,255,.12); }
  button.sec:hover { background: rgba(255,255,255,.2); }
  .acoes { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .lista {
    background: rgba(0,0,0,.25); border-radius: 10px; padding: 14px;
    font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 15px;
    letter-spacing: .06em; line-height: 2; max-height: 320px; overflow-y: auto;
    white-space: pre; user-select: all;
  }
  .lista:empty { display: none; }
  .verif { margin-top: 26px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,.15); }
  #resultadoVerif { margin-top: 10px; font-size: 14px; font-weight: 700; min-height: 20px; }
  .ok { color: #6EE7A0; } .mal { color: #FCA5A5; }
</style>
</head>
<body>
<div class="card">
  <h1>Gerador de Códigos de Ativação</h1>
  <p class="sub">Guía y Kit de Alimentación GLP-1 · uso interno</p>
  <div class="aviso">⚠️ Arquivo privado: não publique nem envie esta página a ninguém. Envie ao comprador apenas o código gerado.</div>

  <label for="qtd">Quantos códigos gerar?</label>
  <div class="row">
    <input id="qtd" type="number" min="1" max="1000" value="10">
    <button onclick="gerar()">Gerar</button>
  </div>

  <div class="acoes">
    <button class="sec" onclick="copiar()">📋 Copiar todos</button>
    <button class="sec" onclick="baixarCSV()">⬇️ Baixar CSV</button>
  </div>
  <div class="lista" id="lista"></div>

  <div class="verif">
    <label for="verif">Verificar um código</label>
    <div class="row" style="margin-bottom:0">
      <input id="verif" placeholder="GLP1-XXXX-XXXX" oninput="verificar()">
    </div>
    <div id="resultadoVerif"></div>
  </div>
</div>

<script>
// ⚠️ Mesmo algoritmo de src/app/codigos.ts — se mudar lá, mude aqui também.
const ALFABETO = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
const SECRETO = 'GLP1-GUIA-ALIMENTACION-2026-K7R4';
const LARGO_CUERPO = 6;

function hashFNV(texto) {
  let h = 0x811c9dc5;
  for (let i = 0; i < texto.length; i++) {
    h ^= texto.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h >>> 0;
}
function checksum(cuerpo) {
  const h = hashFNV(cuerpo + SECRETO);
  return ALFABETO[h % ALFABETO.length] + ALFABETO[Math.floor(h / ALFABETO.length) % ALFABETO.length];
}
function generarCodigo() {
  const rnd = new Uint32Array(LARGO_CUERPO);
  crypto.getRandomValues(rnd);
  let cuerpo = '';
  for (let i = 0; i < LARGO_CUERPO; i++) cuerpo += ALFABETO[rnd[i] % ALFABETO.length];
  const c = cuerpo + checksum(cuerpo);
  return `GLP1-${c.slice(0, 4)}-${c.slice(4)}`;
}
function validarCodigo(entrada) {
  let c = entrada.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (c.startsWith('GLP1')) c = c.slice(4);
  if (c.length !== LARGO_CUERPO + 2) return false;
  const cuerpo = c.slice(0, LARGO_CUERPO);
  for (const ch of cuerpo) if (!ALFABETO.includes(ch)) return false;
  return checksum(cuerpo) === c.slice(LARGO_CUERPO);
}

let codigos = [];
function gerar() {
  const n = Math.min(1000, Math.max(1, Number(document.getElementById('qtd').value) || 10));
  const set = new Set();
  while (set.size < n) set.add(generarCodigo());
  codigos = [...set];
  document.getElementById('lista').textContent = codigos.join('\n');
}
function copiar() {
  if (!codigos.length) return alert('Gere os códigos primeiro.');
  navigator.clipboard.writeText(codigos.join('\n')).then(() => alert('Copiado!'));
}
function baixarCSV() {
  if (!codigos.length) return alert('Gere os códigos primeiro.');
  const data = new Date().toISOString().slice(0, 10);
  const csv = 'codigo,gerado_em,entregue_a\n' + codigos.map((c) => `${c},${data},`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `codigos-glp1-${data}.csv`;
  a.click();
}
function verificar() {
  const v = document.getElementById('verif').value.trim();
  const el = document.getElementById('resultadoVerif');
  if (!v) { el.textContent = ''; return; }
  const ok = validarCodigo(v);
  el.textContent = ok ? '✅ Código válido' : '❌ Código inválido';
  el.className = ok ? 'ok' : 'mal';
}
</script>
</body>
</html>
