name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write server-side API config (Resend + Hotmart)
        run: |
          cat > public/api/config.php <<PHP
          <?php
          define('RESEND_API_KEY', '${{ secrets.RESEND_API_KEY }}');
          define('HOTMART_HOTTOK', '${{ secrets.HOTMART_HOTTOK }}');
          define('FROM_EMAIL', '${{ secrets.RESEND_FROM_EMAIL }}');
          define('FROM_NAME', 'Método Proteína Primero');
          PHP

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 185.245.180.248
          username: u565256123
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
          timeout: 60000
